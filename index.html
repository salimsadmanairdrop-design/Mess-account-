<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mess Accounts - One Page PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        /* PDF Area Wrapper */
        #pdfWrapper { width: 1100px; margin: auto; }

        #pdfArea { 
            background: white; 
            padding: 30px; 
            box-sizing: border-box;
            width: 100%;
        }

        .container { background: #fff; width: 100%; }

        .fixed-cost-section { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #e8f4fd; padding: 15px; border-radius: 8px; border-left: 5px solid #1a73e8; }
        .input-group { flex: 1; min-width: 140px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .summary-box { flex-basis: 100%; display: flex; justify-content: space-between; margin-top: 15px; font-weight: bold; color: #1a73e8; }

        h2 { text-align: center; margin-bottom: 15px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .info-header { text-align: center; margin-bottom: 20px; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; font-size: 13px; }
        th { background: #1abc9c; color: white; }

        .meal-input { width: 55px !important; text-align: center; }
        .editable-cell { width: 85px !important; background: #fffdf0; text-align: center; font-weight: bold; }

        .custom-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .custom-section h4 { margin-bottom: 10px; color: #2980b9; }

        .btn-group { text-align: center; margin-top: 30px; padding-bottom: 50px; }
        .btn { padding: 12px 25px; border: none; background: #1abc9c; color: #fff; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-pdf { background: #34495e; }
        .btn-danger { background: #e74c3c; }

        /* Fix for scrollable view on web */
        @media screen and (max-width: 1150px) {
            #pdfWrapper { overflow-x: auto; width: 100%; }
            #pdfArea { width: 1100px; }
        }
    </style>
</head>
<body>

<div id="pdfWrapper">
    <div id="pdfArea">
        <h2>Monthly Mess Accounts</h2>
        
        <div class="info-header">
            <b>Month:</b> <input type="text" id="month" placeholder="Month Name" style="width:200px; border:none; border-bottom:2px solid #333; text-align:center; font-weight:bold;">
            <span style="margin-left:40px;"><b>Auto Meal Rate:</b> <span id="mealRateDisplay">0.00</span> TK</span>
        </div>
        
        <div class="fixed-cost-section">
            <div class="input-group"><label>House Rent</label><input type="number" id="rent" oninput="calculateFixed()"></div>
            <div class="input-group"><label>Current Bill</label><input type="number" id="current" oninput="calculateFixed()"></div>
            <div class="input-group"><label>Waste Bill</label><input type="number" id="waste" oninput="calculateFixed()"></div>
            <div class="input-group"><label>Cook Bill</label><input type="number" id="cook" oninput="calculateFixed()"></div>
            <div class="input-group"><label>Others</label><input type="number" id="others" oninput="calculateFixed()"></div>
            <div class="summary-box">
                <span>Total Fixed Cost: <span id="displayTotalFixed">0.00</span> TK</span>
                <span>Cost Per Member: <span id="displayPerMember">0.00</span> TK</span>
            </div>
        </div>

        <table id="mealTable">
            <thead>
                <tr>
                    <th style="width:40px">Sl</th>
                    <th>Name</th>
                    <th style="width:70px">Meal</th>
                    <th style="width:90px">Rate</th>
                    <th style="width:100px">Meal Cost</th>
                    <th style="width:90px">Fixed</th>
                    <th style="width:100px">Total</th>
                    <th style="width:100px">Deposit</th>
                    <th style="width:90px">Due</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr style="background: #f2f2f2; font-weight: bold;">
                    <td colspan="2">GRAND TOTAL</td>
                    <td id="sumMeal">0</td>
                    <td>-</td>
                    <td id="sumMealCost">0</td>
                    <td id="sumFixed">0</td>
                    <td id="sumTotal">0</td>
                    <td id="sumDeposit">0</td>
                    <td id="sumDue">0</td>
                </tr>
            </tfoot>
        </table>

        <div class="custom-section">
            <h4>Manual Additional Section</h4>
            <table id="customTable">
                <thead>
                    <tr>
                        <th style="width:40px">Sl</th>
                        <th>Name</th>
                        <th style="width:70px">Meal</th>
                        <th style="width:90px">Rate</th>
                        <th style="width:100px">Meal Cost</th>
                        <th style="width:90px">Fixed</th>
                        <th style="width:100px">Total</th>
                        <th style="width:100px">Deposit</th>
                        <th style="width:90px">Due</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="btn-group">
    <button class="btn" onclick="addRow()">+ Add Main Member</button>
    <button class="btn btn-danger" onclick="removeLastRow()">- Remove Member</button>
    <button class="btn" style="background:#8e44ad" onclick="addManualRow()">+ Add Manual Row</button>
    <button class="btn btn-pdf" onclick="downloadPDF()">Download Single Page PDF</button>
</div>

<script>
const tbody = document.querySelector("#mealTable tbody");
const customTbody = document.querySelector("#customTable tbody");
let perMemberCost = 0, currentMealRate = 0;

function calculateFixed() {
    const totalFixed = (Number(document.getElementById('rent').value) || 0) + 
                       (Number(document.getElementById('current').value) || 0) + 
                       (Number(document.getElementById('waste').value) || 0) + 
                       (Number(document.getElementById('cook').value) || 0) + 
                       (Number(document.getElementById('others').value) || 0);
    
    document.getElementById('displayTotalFixed').innerText = totalFixed.toFixed(2);
    if(tbody.rows.length > 0) {
        perMemberCost = totalFixed / tbody.rows.length;
        document.getElementById('displayPerMember').innerText = perMemberCost.toFixed(2);
        Array.from(tbody.rows).forEach(row => {
            row.cells[5].querySelector('input').value = perMemberCost.toFixed(2);
            refreshRowCalculations(row);
        });
    }
    updateFooter();
}

function addRow(){
    let row = tbody.insertRow();
    row.innerHTML = `<td>${tbody.rows.length}</td><td><input type="text"></td><td><input type="number" class="meal-input" oninput="globalRecalc()"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td>`;
    calculateFixed();
}

function removeLastRow() { if (tbody.rows.length > 0) { tbody.deleteRow(-1); calculateFixed(); globalRecalc(); } }

function globalRecalc() {
    let tM = 0, tD = 0;
    Array.from(tbody.rows).forEach(r => {
        tM += Number(r.cells[2].querySelector('input').value || 0);
        tD += Number(r.cells[7].querySelector('input').value || 0);
    });
    currentMealRate = (tM > 0) ? (tD / tM) : 0;
    document.getElementById('mealRateDisplay').innerText = currentMealRate.toFixed(2);
    Array.from(tbody.rows).forEach(r => refreshRowCalculations(r));
    updateFooter();
}

function refreshRowCalculations(row) {
    const m = Number(row.cells[2].querySelector('input').value || 0), f = Number(row.cells[5].querySelector('input').value || 0), d = Number(row.cells[7].querySelector('input').value || 0);
    row.cells[3].querySelector('input').value = currentMealRate.toFixed(2);
    row.cells[4].querySelector('input').value = (m * currentMealRate).toFixed(2);
    row.cells[6].querySelector('input').value = ((m * currentMealRate) + f).toFixed(2);
    row.cells[8].querySelector('input').value = (((m * currentMealRate) + f) - d).toFixed(2);
}

function manualRowCalc(el) {
    const row = el.closest("tr");
    const m = Number(row.cells[2].querySelector('input').value || 0), r = Number(row.cells[3].querySelector('input').value || 0), f = Number(row.cells[5].querySelector('input').value || 0), d = Number(row.cells[7].querySelector('input').value || 0);
    row.cells[4].querySelector('input').value = (m * r).toFixed(2);
    row.cells[6].querySelector('input').value = ((m * r) + f).toFixed(2);
    row.cells[8].querySelector('input').value = (((m * r) + f) - d).toFixed(2);
    updateFooter();
}

function updateFooter(){
    let sM=0, sMC=0, sF=0, sT=0, sDep=0, sDue=0;
    Array.from(tbody.rows).forEach(r=>{
        sM += Number(r.cells[2].querySelector('input').value || 0);
        sMC += Number(r.cells[4].querySelector('input').value || 0);
        sF += Number(r.cells[5].querySelector('input').value || 0);
        sT += Number(r.cells[6].querySelector('input').value || 0);
        sDep += Number(r.cells[7].querySelector('input').value || 0);
        sDue += Number(r.cells[8].querySelector('input').value || 0);
    });
    document.getElementById("sumMeal").innerText = sM;
    document.getElementById("sumMealCost").innerText = sMC.toFixed(2);
    document.getElementById("sumFixed").innerText = sF.toFixed(2);
    document.getElementById("sumTotal").innerText = sT.toFixed(2);
    document.getElementById("sumDeposit").innerText = sDep.toFixed(2);
    document.getElementById("sumDue").innerText = sDue.toFixed(2);
}

function addManualRow() {
    let row = customTbody.insertRow();
    row.innerHTML = `<td>${customTbody.rows.length + 1}</td><td><input type="text"></td><td><input type="number" class="meal-input" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td><td><input type="number" class="editable-cell" oninput="manualRowCalc(this)"></td><td><input type="number" class="editable-cell"></td>`;
}

for(let i=0; i<15; i++) addRow();

function downloadPDF(){
    const element = document.getElementById("pdfArea");
    
    // Auto-calculating PDF height based on content to force Single Page
    const opt = {
        margin: [5, 5, 5, 5],
        filename: 'Mess_Report_SinglePage.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2, useCORS: true, width: 1100 },
        jsPDF: { 
            unit: 'mm', 
            format: 'a4', 
            orientation: 'landscape',
            compress: true
        },
        pagebreak: { mode: 'avoid-all' } // Strongly avoids splitting rows
    };

    // Force one-page logic: It scales the content to fit the PDF width
    html2pdf().from(element).set(opt).toPdf().get('pdf').then(function (pdf) {
        const totalPages = pdf.internal.getNumberOfPages();
        if (totalPages > 1) {
            // If it still goes to multiple pages, we could manually adjust, 
            // but orientation landscape + avoid-all usually fixes it.
        }
    }).save();
}
</script>
</body>
</html>
